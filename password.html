      transform: translateY(-50%);
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(16, 12, 8, 0.5);
      pointer-events: none;
      transition: top 0.2s ease, font-size 0.2s ease, color 0.2s ease, transform 0.2s ease;
      background: transparent;
      padding: 0 4px;
    }
    .tg-input:focus + .tg-label,
    .tg-input:not(:placeholder-shown) + .tg-label {
      top: 12px;
      transform: translateY(0);
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--tg-red);
      font-weight: 900;
    }

    /* Animated underline accent inside the field */
    .tg-field::after {
      content: "";
      position: absolute;
      left: 14%;
      right: 14%;
      bottom: 6px;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--tg-red), transparent);
      opacity: 0;
      transform: scaleX(0.4);
      transition: opacity 0.3s ease, transform 0.4s ease;
    }
    .tg-field:focus-within::after {
      opacity: 0.85;
      transform: scaleX(1);
    }

    /* Show / hide password toggle */
    .tg-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 0;
      background: transparent;
      color: rgba(168, 0, 13, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }
    .tg-eye:hover {
      background: rgba(235, 7, 23, 0.08);
      color: var(--tg-red);
    }
    .tg-eye:active { transform: translateY(-50%) scale(0.94); }
    .tg-eye svg { width: 18px; height: 18px; }
    .tg-eye .tg-eye-off { display: none; }
    .tg-eye.is-shown .tg-eye-on  { display: none; }
    .tg-eye.is-shown .tg-eye-off { display: block; }

    /* Caps Lock indicator */
    .tg-caps {
      position: absolute;
      right: 56px;
      top: 50%;
      transform: translateY(-50%) translateX(6px);
      padding: 4px 8px;
      border-radius: 6px;
      background: linear-gradient(135deg, #fff0d8, #ffd994);
      color: #7a4400;
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 4px 12px rgba(255, 175, 0, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .tg-caps.is-on {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    /* Error message */
    .tg-error {
      min-height: 1.2em;
      font-size: 0.85rem;
      font-weight: 700;
      color: #b00018;
      text-align: center;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .tg-error.is-shown {
      opacity: 1;
      transform: translateY(0);
    }

    /* Shake animation for wrong password */
    @keyframes tgShake {
      10%, 90%  { transform: translateX(-2px); }
      20%, 80%  { transform: translateX(4px); }
      30%, 50%, 70% { transform: translateX(-7px); }
      40%, 60%  { transform: translateX(7px); }
    }
    .tg-shake {
      animation: tgShake 0.55s cubic-bezier(.36,.07,.19,.97) both;
    }
    .tg-input.is-error {
      border-color: #d4001a !important;
      box-shadow: 0 0 0 4px rgba(212, 0, 26, 0.18);
    }

    /* Submit button */
    .tg-btn {
      position: relative;
      width: 100%;
      height: 56px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(120deg, #EB0717 0%, #c1000f 50%, #EB0717 100%);
      background-size: 200% 100%;
      background-position: 0% 50%;
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 950;
      letter-spacing: 0.02em;
      cursor: pointer;
      overflow: hidden;
      box-shadow:
        0 14px 30px rgba(235, 7, 23, 0.28),
        0 4px 10px rgba(168, 0, 13, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background-position 0.6s ease;
    }
    .tg-btn:hover {
      background-position: 100% 50%;
      transform: translateY(-2px);
      box-shadow:
        0 22px 44px rgba(235, 7, 23, 0.34),
        0 8px 18px rgba(168, 0, 13, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }
    .tg-btn:active { transform: translateY(0); }

    /* Shimmer sweep across the button */
    .tg-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        100deg,
        transparent 0%,
        rgba(255, 255, 255, 0.0) 30%,
        rgba(255, 255, 255, 0.45) 50%,
        rgba(255, 255, 255, 0.0) 70%,
        transparent 100%
      );
      transform: skewX(-20deg);
      animation: tgBtnShimmer 3.6s ease-in-out infinite;
    }
    @keyframes tgBtnShimmer {
      0%   { left: -75%; }
      55%  { left: 130%; }
      100% { left: 130%; }
    }

    .tg-btn-label {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .tg-btn-arrow {
      transition: transform 0.3s ease;
    }
    .tg-btn:hover .tg-btn-arrow {
      transform: translateX(4px);
    }

    /* Loading state */
    .tg-btn.is-loading { pointer-events: none; }
    .tg-btn.is-loading .tg-btn-label { opacity: 0; }
    .tg-spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 2;
    }
    .tg-btn.is-loading .tg-spinner { opacity: 1; }
    .tg-spinner::before {
      content: "";
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.35);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: tgSpin 0.8s linear infinite;
    }
    @keyframes tgSpin { to { transform: rotate(360deg); } }

    /* Success state */
    .tg-btn.is-success {
      background: linear-gradient(120deg, #1f9d55, #137a3f) !important;
      box-shadow:
        0 16px 32px rgba(31, 157, 85, 0.32),
        0 6px 14px rgba(19, 122, 63, 0.22) !important;
      pointer-events: none;
    }
    .tg-btn.is-success .tg-btn-label { opacity: 0; }
    .tg-btn.is-success .tg-spinner { opacity: 0; }
    .tg-check {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 3;
    }
    .tg-btn.is-success .tg-check { opacity: 1; }
    .tg-check svg { width: 28px; height: 28px; color: #ffffff; }
    .tg-check svg path {
      stroke-dasharray: 36;
      stroke-dashoffset: 36;
      animation: tgDrawCheck 0.5s ease 0.05s forwards;
    }
    @keyframes tgDrawCheck { to { stroke-dashoffset: 0; } }

    /* Footer hint */
    .tg-hint {
      margin-top: 18px;
      text-align: center;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(16, 12, 8, 0.5);
      opacity: 0;
      animation: tgFadeIn 0.7s ease 1s forwards;
    }
    .tg-hint .dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--tg-red);
      border-radius: 50%;
      vertical-align: middle;
      margin: 0 8px;
      animation: tgDotPulse 1.6s ease-in-out infinite;
    }
    @keyframes tgDotPulse {
      0%, 100% { transform: scale(1);   opacity: 0.6; }
      50%      { transform: scale(1.6); opacity: 1; }
    }

    /* Success exit transition for the whole panel */
    .tg-panel-wrap.is-success {
      transform: scale(1.02) translateY(-4px);
      box-shadow:
        0 40px 100px rgba(31, 157, 85, 0.22),
        0 16px 36px rgba(31, 157, 85, 0.18);
      transition: transform 0.6s cubic-bezier(.16,1,.3,1), box-shadow 0.6s ease;
    }
    .tg-panel-wrap.is-leaving {
      opacity: 0;
      transform: scale(1.06) translateY(-12px);
      transition: opacity 0.55s ease, transform 0.7s cubic-bezier(.16,1,.3,1);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .tg-stage { padding: 16px; }
      .tg-panel { padding: 32px 22px 24px; }
      .tg-logo-ring { width: 110px; height: 110px; }
      .tg-logo-ring img { width: 78px; height: 78px; }
      .tg-title { font-size: 1.35rem; }
      .tg-leaf.l1, .tg-leaf.l2 { width: 70px; }
      .tg-leaf.l3, .tg-leaf.l4 { width: 80px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001s !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001s !important;
      }
    }

    /* Hide legacy auth-bg / auth-panel rules from style.css that might leak in */
    body[data-page="password-gate"] .auth-bg,
    body[data-page="password-gate"] .auth-panel,
    body[data-page="password-gate"] .auth-logo {
      all: unset;
    }

          </div>

          <!-- Lock badge -->
          <div class="tg-lock-badge">
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="4" y="11" width="16" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
              </svg>
              Private Access
            </span>
          </div>

          <h1 id="password-title" class="tg-title" aria-label="Enter password to continue">
            <span class="tg-word" style="animation-delay: 0.10s">Enter</span>
            <span class="tg-word" style="animation-delay: 0.20s">password</span>
            <span class="tg-word" style="animation-delay: 0.30s">to</span>
            <span class="tg-word" style="animation-delay: 0.40s">continue</span>
          </h1>
          <p class="tg-subtitle">Use the site password to access Trader Growz before age verification.</p>

          <!-- Password form: keeps existing IDs so server/site logic continues to recognize it. -->
          <form id="password-form" class="tg-form" novalidate>
            <div class="tg-field">
              <input
                id="site-password"
                type="password"
                class="tg-input"
                placeholder=" "
                autocomplete="current-password"
                spellcheck="false"
                autocapitalize="off"
                required>
              <label for="site-password" class="tg-label">Password</label>

              <span class="tg-caps" id="tg-caps" aria-hidden="true">Caps Lock</span>

              <button type="button" class="tg-eye" id="tg-eye" aria-label="Show password" aria-pressed="false">
                <svg class="tg-eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="tg-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a18.45 18.45 0 0 1 4.06-5.06"></path>
                  <path d="M9.9 4.24A10.45 10.45 0 0 1 12 4c6.5 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19"></path>
                  <path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"></path>
                  <line x1="2" y1="2" x2="22" y2="22"></line>
                </svg>
              </button>
            </div>

            <p id="password-error" class="tg-error" role="alert" aria-live="polite"></p>

            <button type="submit" class="tg-btn" id="tg-submit">
              <span class="tg-btn-label">
                <span>Continue</span>
                <svg class="tg-btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="13 6 19 12 13 18"></polyline>
                </svg>
              </span>
              <span class="tg-spinner" aria-hidden="true"></span>
              <span class="tg-check" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="5 12 10 17 19 7"></polyline>
                </svg>
              </span>
            </button>
          </form>

          <p class="tg-hint">Trader Growz <span class="dot"></span> California</p>
        </section>
      </div>
    </div>
  </main>

  <script>
    (function () {
      // ---- Particles -------------------------------------------------
      const particleHost = document.getElementById("tg-particles");
      if (particleHost) {
        const count = window.matchMedia("(max-width: 600px)").matches ? 18 : 36;
        for (let i = 0; i < count; i += 1) {
          const p = document.createElement("span");
          p.className = "tg-particle";
          const size = 3 + Math.random() * 6;
          p.style.width = size + "px";
          p.style.height = size + "px";
          p.style.left = (Math.random() * 100) + "vw";
          p.style.setProperty("--dx", ((Math.random() - 0.5) * 220) + "px");
          p.style.animationDuration = (10 + Math.random() * 14) + "s";
          p.style.animationDelay = (-Math.random() * 14) + "s";
          p.style.opacity = String(0.35 + Math.random() * 0.45);
          particleHost.appendChild(p);
        }
      }

      // ---- Panel entrance --------------------------------------------
      const panelWrap = document.getElementById("tg-panel-wrap");
      requestAnimationFrame(function () {
        if (panelWrap) panelWrap.classList.add("is-ready");
      });

      // ---- GSAP entrance choreography (progressive enhancement) ------
      function runGsap() {
        if (typeof window.gsap === "undefined") return;
        const gsap = window.gsap;
        gsap.from(".tg-logo-ring", {
          y: -30, opacity: 0, scale: 0.8, duration: 0.9, ease: "back.out(1.6)", delay: 0.05
        });
        gsap.from(".tg-lock-badge", { y: -8, opacity: 0, duration: 0.5, delay: 0.25 });
        gsap.from(".tg-hint", { opacity: 0, duration: 0.6, delay: 1.0 });
      }
      if (document.readyState === "complete") runGsap();
      else window.addEventListener("load", runGsap);

      // ---- Show / hide password --------------------------------------
      const eyeBtn = document.getElementById("tg-eye");
      const input  = document.getElementById("site-password");
      if (eyeBtn && input) {
        eyeBtn.addEventListener("click", function () {
          const showing = input.type === "text";
          input.type = showing ? "password" : "text";
          eyeBtn.classList.toggle("is-shown", !showing);
          eyeBtn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
          eyeBtn.setAttribute("aria-pressed", String(!showing));
          input.focus();
        });
      }

      // ---- Caps Lock detection ---------------------------------------
      const capsBadge = document.getElementById("tg-caps");
      function updateCaps(event) {
        if (!capsBadge || !event || typeof event.getModifierState !== "function") return;
        const on = event.getModifierState("CapsLock");
        capsBadge.classList.toggle("is-on", on);
      }
      if (input) {
        input.addEventListener("keydown", updateCaps);
        input.addEventListener("keyup", updateCaps);
        input.addEventListener("blur", function () {
          if (capsBadge) capsBadge.classList.remove("is-on");
        });
      }

      // Clear error styling as user re-types
      const errorEl = document.getElementById("password-error");
      if (input && errorEl) {
        input.addEventListener("input", function () {
          input.classList.remove("is-error");
          errorEl.classList.remove("is-shown");
          errorEl.textContent = "";
        });
      }

      // ---- Form submit (own the flow + animate, then redirect) -------
      const form    = document.getElementById("password-form");
      const submitBtn = document.getElementById("tg-submit");

      function isAgeVerified() {
        try {
          return (
            localStorage.getItem("ageVerified") === "true" ||
            sessionStorage.getItem("ageVerified") === "true"
          );
        } catch (_) { return false; }
      }

      function showError(message) {
        if (!errorEl) return;
        errorEl.textContent = message;
        errorEl.classList.add("is-shown");
        if (input) {
          input.classList.add("is-error");
          input.classList.remove("tg-shake");
          // Force reflow so the animation can replay.
          void input.offsetWidth;
          input.classList.add("tg-shake");
        }
        if (panelWrap) {
          panelWrap.classList.remove("tg-shake");
          void panelWrap.offsetWidth;
          panelWrap.classList.add("tg-shake");
        }
      }

      function setLoading(on) {
        if (!submitBtn) return;
        submitBtn.classList.toggle("is-loading", on);
        submitBtn.disabled = on;
      }

      function playSuccessAndRedirect() {
        if (submitBtn) {
          submitBtn.classList.remove("is-loading");
          submitBtn.classList.add("is-success");
        }
        if (panelWrap) {
          panelWrap.classList.add("is-success");
        }
        // After the success cue, fade panel and navigate.
        setTimeout(function () {
          if (panelWrap) panelWrap.classList.add("is-leaving");
          setTimeout(function () {
            try {
              localStorage.setItem("isLoggedIn", "true");
              sessionStorage.setItem("showHomePromo", "true");
            } catch (_) { /* ignore */ }
            const target = isAgeVerified() ? "home.html" : "index.html";
            window.location.replace(target);
          }, 520);
        }, 650);
      }

      if (form) {
        // Capture phase + stopImmediatePropagation prevents the legacy
        // setupPasswordGate handler from also running (in case data-page
        // is later changed back to "password").
        form.addEventListener("submit", function (event) {
          event.preventDefault();
          event.stopImmediatePropagation();

          const value = input ? input.value.trim() : "";
          if (!value) {
            showError("Please enter the password to continue.");
            return;
          }

          setLoading(true);

          // Brief artificial delay so the spinner is visible and the
          // success transition feels intentional rather than abrupt.
          setTimeout(function () {
            if (value === "PHUNKY") {
              playSuccessAndRedirect();
            } else {
              setLoading(false);
              showError("Incorrect password. Please try again.");
              if (input) {
                input.focus();
                input.select();
              }
            }
          }, 520);
        }, true);
      }
    }());
  </script>
